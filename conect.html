    .contacts {
      max-width: 700px;
      margin: auto;
      display: grid;
      grid-template-columns: 1fr;
      gap: 20px;
    }

    .contact-item {
      background: rgba(255,255,255,0.1);
      padding: 20px;
      border-radius: 10px;
      text-align: center;
      transition: transform 0.3s, background 0.3s;
    }

    .contact-item:hover {
      transform: translateY(-5px);
      background: rgba(255,255,255,0.2);
    }

    .contact-item h2 {
      margin-bottom: 10px;
      font-size: 22px;
      color: #00c3ff;
    }

    .contact-item a {
      display: inline-block;
      padding: 10px 20px;
      background: #00c3ff;
      color: #fff;
      text-decoration: none;
      border-radius: 6px;
      transition: background 0.3s;
    }

    .contact-item a:hover {
      background: #0077b6;
    }

    

/* مكان البرجر */
#navbar {
  position: fixed;
  top: 15px;
  left: 15px;
  background: transparent; /* خلفية شفافة */
  z-index: 1000;
}

/* أيقونة البرجر */
.burger {
  width: 35px;   /* أكبر شوية */
  height: 30px;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
  cursor: pointer;
}

.burger span {
  display: block;
  height: 4px;
  background: #ffffff;
  border-radius: 2px;
  transition: 0.4s;
}

/* حالة التحول إلى × */
.burger.active span:nth-child(1) {
  transform: rotate(45deg) translate(6px, 6px);
}
.burger.active span:nth-child(2) {
  opacity: 0;
}
.burger.active span:nth-child(3) {
  transform: rotate(-45deg) translate(6px, -6px);
}

/* القائمة */
.menu {
